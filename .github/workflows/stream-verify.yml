name: stream-smoke-verify

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify-stream-smoke-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Verify latest stream smoke run artifact
        run: |
          python scripts/verify_stream_smoke_run.py \
            --latest \
            --root-dir logs/stream_smoke_qwen3 \
            --json
